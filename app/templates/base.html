<!DOCTYPE html>
<html lang="en" class="bg-cream text-warm-brown">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Photography Portfolio{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/css/output.css">
  <script defer src="/static/js/app.js"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="min-h-screen font-queens antialiased">

  {% block nav %}
  {% if toc_sections is defined %}
  {% include "partials/sticky_note.html" %}
  {% endif %}
  {% endblock %}

  <main class="{% if toc_sections is defined %}ml-sticky max-md:ml-0 max-md:mb-[32px]{% endif %} min-h-screen">
    {% block content %}{% endblock %}
  </main>

  <!-- Lightbox container: populated by HTMX on interior pages -->
  <div id="lightbox" class="hidden fixed inset-0 z-50"></div>

</body>
</html>
