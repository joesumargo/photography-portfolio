<div class="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4 animate-[fadeIn_200ms_ease-out]"
     onclick="if(event.target===this) closeLightbox()">
  <div class="relative max-w-5xl w-full max-h-[90vh] flex flex-col items-center animate-[scaleIn_250ms_ease-out]">
    <!-- Close button -->
    <button onclick="closeLightbox()"
            class="absolute -top-10 right-0 text-neutral-400 hover:text-white text-3xl z-10 transition-colors duration-200">&times;</button>

    <!-- Image -->
    <img src="{{ image_src or photo.medium_url }}"
         alt="{{ photo.title }}"
         class="max-w-full max-h-[80vh] object-contain rounded-sm shadow-2xl cursor-zoom-in select-none"
         draggable="false">

    <!-- Caption -->
    <div class="mt-4 text-center space-y-1 max-w-lg">
      <h2 class="text-lg font-medium text-white">{{ photo.title }}</h2>
      {% if photo.description %}
      <p class="text-sm text-neutral-400">{{ photo.description }}</p>
      {% endif %}
      <div class="flex justify-center gap-4 text-xs text-neutral-500 pt-1">
        {% if photo.date %}<span>{{ photo.date }}</span>{% endif %}
        {% if photo.location %}<span>{{ photo.location }}</span>{% endif %}
        {% if photo.camera %}<span>{{ photo.camera }}</span>{% endif %}
      </div>
    </div>
  </div>
</div>
